<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title data-i18n="page.title">aiClaw Settings</title>
  <style>
    body {
      width: 250px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 15px;
      margin: 0;
      color: #333;
    }
    h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; color: #10b981; }
    label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
    input { width: 100%; box-sizing: border-box; padding: 6px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button {
      width: 100%; box-sizing: border-box; padding: 8px; border: none; border-radius: 4px;
      background-color: #10b981; color: #fff; font-size: 14px; font-weight: bold; cursor: pointer;
    }
    button:hover { background-color: #059669; }
    #statusMsg { font-size: 13px; color: #10b981; margin-top: 5px; text-align: center; }
    .help-text {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.5;
      color: #4b5563;
    }
    .help-text a {
      color: #10b981;
      text-decoration: none;
    }
    .help-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h3 data-i18n="app.heading">🤖 aiClaw Settings</h3>
  
  <label data-i18n="label.host">WebSocket Host/IP</label>
  <input type="text" id="hostInput" value="127.0.0.1">
  
  <label data-i18n="label.port">WebSocket Port</label>
  <input type="number" id="portInput" value="8766">
  
  <label data-i18n="label.instance_name">Instance Name</label>
  <input type="text" id="nameInput" data-i18n-placeholder="placeholder.instance_name" placeholder="User">
  
  <button id="saveBtn" data-i18n="button.save">Save & Reconnect</button>
  <div id="statusMsg"></div>
  <div class="help-text">
    <span data-i18n="help.text">本产品需要配合 OpenHub 使用，访问网址是</span>
    <a href="https://aiwithblockchain.github.io/" target="_blank">https://aiwithblockchain.github.io/</a>
  </div>
  
  <script src="js/popup.js"></script>
</body>
</html>

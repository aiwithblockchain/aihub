<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TweetClaw Settings</title>
  <style>
    body {
      width: 250px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 15px;
      margin: 0;
      color: #333;
    }
    h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; color: #1DA1F2; }
    label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
    input { width: 100%; box-sizing: border-box; padding: 6px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button {
      width: 100%; box-sizing: border-box; padding: 8px; border: none; border-radius: 4px;
      background-color: #1DA1F2; color: #fff; font-size: 14px; font-weight: bold; cursor: pointer;
    }
    button:hover { background-color: #1a91da; }
    #debugBtn { background-color: #4ade80; margin-top: 15px; color: #1f2937; }
    #debugBtn:hover { background-color: #3db866; }
    #statusMsg { font-size: 13px; color: #10b981; margin-top: 5px; text-align: center; }
  </style>
</head>
<body>
  <h3>🚀 TweetClaw Settings</h3>
  
  <label>WebSocket Port</label>
  <input type="number" id="portInput" value="8765">
  
  <button id="saveBtn">Save & Reconnect</button>
  <div id="statusMsg"></div>
  
  <hr style="margin-top: 15px; margin-bottom: 0; border: 0; border-top: 1px solid #eee;">
  
  <button id="debugBtn">Open Debug Interface</button>
  
  <script src="js/popup.js"></script>
</body>
</html>

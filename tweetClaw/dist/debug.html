<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TweetClaw — Debug Panel</title>
    <link href="vendor/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --x-blue: #1DA1F2;
            --bg-body: #0f172a;
            --sidebar-w: 280px;
            --header-h: 52px;
        }
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; margin: 0;
            background: var(--bg-body);
            font-family: 'Inter', system-ui, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
        }

        .app {
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            grid-template-rows: var(--header-h) 1fr;
            height: 100vh;
        }

        header {
            grid-column: 1 / -1;
            background: #1a202c;
            border-bottom: 1px solid #2d3748;
            display: flex; align-items: center;
            padding: 0 20px; gap: 12px;
        }
        header h5 { margin: 0; font-size: 15px; }

        .sidebar {
            background: #1a202c;
            border-right: 1px solid #2d3748;
            overflow-y: auto; padding: 12px;
            height: calc(100vh - var(--header-h));
        }

        .main {
            overflow-y: auto;
            padding: 16px 20px;
            background: var(--bg-body);
            height: calc(100vh - var(--header-h));
        }

        /* ── Tab items ── */
        .tab-item {
            padding: 10px 12px; background: #2d3748;
            border-radius: 8px; margin-bottom: 8px;
            cursor: pointer; border: 2px solid transparent;
            transition: background 0.12s;
        }
        .tab-item:hover { background: #4a5568; }
        .tab-item.active { border-color: var(--x-blue); background: #1e293b; }

        .status-badge {
            font-size: 10px; padding: 2px 7px;
            border-radius: 9px; text-transform: uppercase;
        }
        .bg-success-subtle { background: rgba(72,187,120,.2); color: #68d391; }

        .section-label {
            font-size: 10px; font-weight: 700; color: #718096;
            text-transform: uppercase; letter-spacing: 1px;
            margin: 14px 0 7px;
        }

        /* ── Cards ── */
        .card {
            background: #1a202c; border: 1px solid #2d3748;
            border-radius: 10px; margin-bottom: 14px;
        }
        .card-header {
            background: rgba(45,55,72,.45); border-bottom: 1px solid #2d3748;
            padding: 8px 14px; font-weight: 600; font-size: 12px;
            border-radius: 10px 10px 0 0;
        }
        .card-body { padding: 10px 14px; }

        .sys-stat {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 5px; font-size: 11px;
        }
        .val { color: #fff; font-weight: 600; }

        /* ── D 区：Hit 卡片网格 ── */
        .hit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }
        .hit-card {
            background: #1e293b;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 10px 12px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .hit-card-id { border-color: #d69e2e44; background: #1e1a0e; }
        .hit-card-top {
            display: flex; align-items: center; gap: 6px;
            overflow: hidden;
        }
        .hit-card-op {
            font-weight: 700; font-size: 11px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            flex: 1;
        }
        .hit-card-path {
            font-size: 10px; color: #718096;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .hit-card-params {
            font-size: 10px; color: #a0aec0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .hit-card-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 4px;
        }
        .btn-hit-detail {
            background: none; border: 1px solid #4a5568; color: #a0aec0;
            border-radius: 5px; padding: 2px 8px; font-size: 10px;
            cursor: pointer; transition: all .15s;
        }
        .btn-hit-detail:hover { border-color: var(--x-blue); color: var(--x-blue); }

        /* ── Modal ── */
        #tc-hit-modal {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .tc-modal-backdrop {
            position: absolute; inset: 0;
            background: rgba(0,0,0,.7); backdrop-filter: blur(2px);
        }
        .tc-modal-box {
            position: relative; z-index: 1;
            background: #1a202c; border: 1px solid #4a5568;
            border-radius: 12px; width: 780px; max-width: 95vw;
            max-height: 85vh; display: flex; flex-direction: column;
            box-shadow: 0 25px 60px rgba(0,0,0,.6);
        }
        .tc-modal-header {
            display: flex; align-items: center; gap: 6px;
            padding: 12px 16px; border-bottom: 1px solid #2d3748;
            flex-shrink: 0;
        }
        .tc-modal-body {
            overflow-y: auto; padding: 16px; flex: 1;
        }
        .tc-modal-section { margin-bottom: 16px; }
        .tc-modal-label {
            font-size: 10px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; color: #718096; margin-bottom: 4px;
        }
        .tc-modal-pre {
            background: #000; color: #4ade80;
            padding: 10px; border-radius: 6px;
            font-size: 10px; overflow: auto;
            white-space: pre-wrap; word-break: break-all;
            max-height: 280px; margin: 0;
        }

        pre {
            background: #000; color: #4ade80;
            padding: 10px; border-radius: 6px;
            font-size: 10px; margin: 0; overflow: auto;
            white-space: pre-wrap; word-break: break-all;
        }

        .btn-action { padding: 3px 9px; font-size: 11px; border-radius: 5px; }

        #refresh-btn {
            font-size: 11px; padding: 3px 10px; border-radius: 5px;
            cursor: pointer; background: transparent;
            border: 1px solid #4a5568; color: #a0aec0;
        }
        #refresh-btn:hover { border-color: var(--x-blue); color: var(--x-blue); }
    </style>
</head>
<body>
<div class="app">

    <header>
        <h5 class="fw-bold mb-0">
            TweetClaw <span class="text-info">Debug Panel</span>
            <span class="badge bg-secondary ms-2" style="font-size:9px;">v5.4</span>
        </h5>
        <div class="ms-auto d-flex align-items-center gap-2">
            <span id="global-stats" class="text-muted" style="font-size:10px;"></span>
            <button id="refresh-btn" onclick="location.reload()">↻ Refresh</button>
        </div>
    </header>

    <aside class="sidebar">
        <div class="section-label">Active X Tabs</div>
        <div id="tab-list">
            <div class="text-muted small p-1">Loading…</div>
        </div>

        <div class="section-label">Execution Environment</div>
        <div class="card">
            <div class="card-body py-2" id="sidebar-env">
                <div class="sys-stat">
                    <span>Write Policy</span>
                    <span class="val text-muted">Loading…</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="main">
        <div id="tab-data-view">
            <div class="text-center mt-5 text-muted">
                <h4>Select an X tab to view capture data</h4>
                <p class="small">Open x.com, then select a tab on the left</p>
            </div>
        </div>
    </main>
</div>

<script src="vendor/bootstrap.bundle.min.js"></script>
<script src="js/debug.js"></script>
</body>
</html>
